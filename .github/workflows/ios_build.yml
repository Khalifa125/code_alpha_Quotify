name: Build iOS App

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: false

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.29.0'
        channel: 'stable'

    - name: Cache Flutter dependencies
      uses: actions/cache@v5
      with:
        path: |
          ~/.pub-cache
          .dart_tool
        key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pub-

    - name: Cache CocoaPods
      uses: actions/cache@v5
      with:
        path: ios/Pods
        key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') }}
        restore-keys: |
          ${{ runner.os }}-pods-

    - name: Cleanup old artifacts
      continue-on-error: true
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        gh api /repos/${{ github.repository }}/actions/artifacts --paginate --jq '.artifacts[].id' | while read id; do
          gh api -X DELETE /repos/${{ github.repository }}/actions/artifacts/$id
        done

    - name: Get dependencies
      run: flutter pub get

    - name: Build iOS for Simulator
      run: flutter build ios --simulator --no-codesign

    - name: Build iOS Release App
      run: flutter build ios --release --no-codesign

    - name: Package unsigned IPA
      run: |
        mkdir -p build/ios/ipa/Payload
        cp -r build/ios/iphoneos/Runner.app build/ios/ipa/Payload/
        cd build/ios/ipa
        zip -r quotify-unsigned.ipa Payload/
        ls -la

    - name: Upload IPA
      if: success()
      continue-on-error: true
      uses: actions/upload-artifact@v4
      with:
        name: quotify-ipa
        path: build/ios/ipa/quotify-unsigned.ipa
        retention-days: 1