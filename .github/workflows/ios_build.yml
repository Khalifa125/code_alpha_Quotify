name: Build iOS App

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.29.0'
        channel: 'stable'

    - name: Get dependencies
      run: flutter pub get

    - name: Build iOS for Simulator
      run: flutter build ios --simulator --no-codesign

    - name: Build iOS Release (IPA)
      run: |
        flutter build ipa --release --no-codesign

    - name: Prepare IPA
      run: |
        cd build/ios/ipa
        ls -la

    - name: Upload IPA
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: quotify-ipa
        path: |
          build/ios/ipa/*.ipa
          build/ios/ipa/*.app
        retention-days: 30

    - name: Upload Simulator App
      uses: actions/upload-artifact@v4
      with:
        name: quotify-simulator-app
        path: build/ios/iphonesimulator/Runner.app
        retention-days: 7