workflows:
  ios-ipa-build:
    name: iOS IPA Build
    max_build_duration: 120
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      node: 18
    scripts:
      - name: Get dependencies
        script: |
          flutter pub get

      - name: iOS Pod install
        script: |
          cd ios && pod install --repo-update

      - name: Build iOS IPA
        script: |
          flutter build ipa --release --no-codesign --export-options-plist=/Users/builder/export_options.plist

      - name: Fix iOS bundle
        script: |
          /usr/libexec/PlistBuddy -c "Add :CFBundleDisplayName string Quotify" ios/Runner/Info.plist || true
    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/ipa/*.app

  android-build:
    name: Android APK Build
    max_build_duration: 60
    environment:
      flutter: stable
      android-sdk: latest
    scripts:
      - name: Get dependencies
        script: |
          flutter pub get

      - name: Build Android APK
        script: |
          flutter build apk --release

    artifacts:
      - build/app/outputs/flutter-apk/*.apk

  web-build:
    name: Web Build
    max_build_duration: 60
    environment:
      flutter: stable
    scripts:
      - name: Get dependencies
        script: |
          flutter pub get

      - name: Build Web
        script: |
          flutter build web --release

    artifacts:
      - build/web/**/*