name: quotify
description: Quotify - A beautiful Random Quote Generator app with premium design
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # State Management
  flutter_riverpod: ^2.6.1
  equatable: ^2.0.7
  
  # Networking
  http: ^1.2.2
  
  # Environment
  flutter_dotenv: ^6.0.0
  
  # Animations
  flutter_animate: ^4.5.2
  
  # Shimmer / Skeleton
  skeletonizer: ^2.1.3
  
  # Typography
  google_fonts: ^6.2.1
  
  # Share
  share_plus: ^10.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - .env